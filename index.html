<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: black;
        color: white;
        text-align: center;
        padding: 50px;
    }

    h2 {
        margin-bottom: 20px;
        animation: bounce 1.2s infinite;
    }

    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(10px); }
    }

    img {
        width: 200px;
        cursor: pointer;
        transition: transform 0.2s;
    }

    img:hover {
        transform: scale(1.1);
    }

    #letter {
        opacity: 0;
        visibility: hidden;
        margin-top: 30px;
        padding: 20px;
        background: #111;
        border-radius: 10px;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 0 0 15px rgba(255,255,255,0.1);
        text-align: left;
        transition: opacity 1s ease;
    }

    #letter.show {
        opacity: 1;
        visibility: visible;
    }
</style>
</head>

<body>

<h2>Click ↓</h2>

<img src="j.gif" onclick="startLetter()" alt="Clickable GIF">

<div id="letter">
    <h3>I is for <b>Interactions</b></h3>
    <p id="text"></p>
</div>

    <div class="video-link">
        <p>There’s something I want you to listen to:</p>
        <a href="https://www.youtube.com/watch?v=5soixb2U6xM&list=RD5soixb2U6xM&start_radio=1" target="_blank">
            Click here to watch
        </a>
    </div>

<script>
const message = `There’s something I’ve come to understand about us, and I don’t think I’ve said it plainly before.

I find joy in being with you.

Not just in the easy moments, not only when we’re laughing or everything feels light, but even in the times when we don’t see eye to eye. Even when we argue, when things get tense or a little messy, there’s still something underneath it all that I wouldn’t trade away. 

Because even then, it’s still you.

And somehow, that makes a difference. It reminds me that what we have isn’t shallow or temporary. We care enough to feel strongly, enough to disagree, enough to want to be understood by each other. And even in those moments, I don’t feel like I want to walk away. I just want to find our way back.

The happiness I feel with you isn’t fragile. It doesn’t disappear the moment things get difficult. It stays, quieter maybe, but still there, waiting for us to meet each other again after the noise settles.

So when I say I enjoy being with you, I mean all of it. The warmth, the chaos, the growth, the understanding that comes after.

Every part of you, every part of us, still feels worth it to me.

And somehow, even in the middle of everything, you still bring me a kind of joy I can’t find anywhere else.`;

let index = 0;

function typeWriter() {
    if (index < message.length) {
        document.getElementById("text").innerHTML += message.charAt(index);
        index++;
        setTimeout(typeWriter, 25);
    }
}

function startLetter() {
    const letter = document.getElementById("letter");
    letter.classList.add("show");

    if (index === 0) {
        typeWriter();
    }
}
</script>

</body>
</html>
